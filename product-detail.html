<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto – MK Store</title>

    <link rel="stylesheet" href="style.css">

    <!-- BOXICONS -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">

    <link href="https://fonts.googleapis.com/css?family=Jost:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* PRODUCTO DETALLE */
        .product-detail-section {
            display: flex;
            gap: 40px;
            padding: 40px;
            max-width: 1200px;
            margin: 120px auto 40px auto;
            flex-wrap: wrap;
        }

        .product-detail-image {
            flex: 1;
            min-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-detail-image img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-detail-info {
            flex: 1;
            min-width: 300px;
        }

        .product-detail-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #222;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .product-rating i {
            color: #FFB20E;
            font-size: 1.2rem;
        }

        .product-rating span {
            color: #666;
            font-size: 0.9rem;
        }

        .product-detail-price {
            font-size: 2rem;
            color: #ee1c47;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .product-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .product-details-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .product-details-list li {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-details-list i {
            color: #ee1c47;
            font-size: 1.2rem;
        }

        .product-details-list span {
            color: #666;
        }

        .product-options {
            margin-bottom: 30px;
        }

        .product-options label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #222;
        }

        .product-options select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: border 0.3s;
        }

        .product-options select:focus {
            border-color: #ee1c47;
            outline: none;
        }

        .color-options {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            border: 3px solid #eee;
            cursor: pointer;
            transition: all 0.3s;
        }

        .color-option:hover {
            border-color: #ee1c47;
            transform: scale(1.05);
        }

        .color-option.selected {
            border-color: #ee1c47;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #ee1c47;
        }

        .product-quantity {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .quantity-btn:hover {
            background: #ee1c47;
            color: white;
            border-color: #ee1c47;
        }

        .quantity-display {
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        .product-actions-detail {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-add-cart-detail {
            flex: 1;
            padding: 15px 30px;
            background: #ee1c47;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-add-cart-detail:hover {
            background: #d91a3f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(238, 28, 71, 0.3);
        }

        .btn-wishlist-detail {
            flex: 1;
            padding: 15px 30px;
            background: white;
            color: #ee1c47;
            border: 2px solid #ee1c47;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-wishlist-detail:hover {
            background: #ee1c47;
            color: white;
        }

        /* PRODUCTOS RECOMENDADOS */
        .recommended-section {
            background: #f5f5f5;
            padding: 40px;
            margin-top: 60px;
        }

        .recommended-products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .product-detail-section {
                flex-direction: column;
                padding: 20px;
                gap: 30px;
                margin-top: 100px;
            }

            .product-detail-info h1 {
                font-size: 1.8rem;
            }

            .product-detail-price {
                font-size: 1.5rem;
            }

            .product-details-list {
                grid-template-columns: 1fr;
            }

            .product-actions-detail {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .product-detail-section {
                margin-top: 90px;
            }

            .product-detail-info h1 {
                font-size: 1.5rem;
            }

            .product-detail-price {
                font-size: 1.3rem;
            }

            .color-options {
                flex-wrap: wrap;
            }

            .color-option {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <section class="bought-together-section">
        <div class="section-container">
            <h2>Comprados juntos habitualmente</h2>
            <div class="bought-together-grid" id="boughtTogetherGrid">
                <!-- Productos cargados dinámicamente -->
            </div>
        </div>
    </section>

    <!-- SECCIÓN: OPINIONES DESTACADAS -->
    <section class="reviews-section">
        <div class="section-container">
            <h2>Opiniones destacadas</h2>
            <div class="reviews-grid" id="reviewsGrid">
                <!-- Opiniones cargadas dinámicamente -->
            </div>
        </div>
    </section>

    <!-- SECCIÓN: PRODUCTOS DESTACADOS PARA TENER EN CUENTA -->
    <section class="featured-products-section">
        <div class="section-container">
            <h2>Productos destacados para tener en cuenta</h2>
            <div class="featured-carousel-container">
                <button class="carousel-btn prev-btn" id="prevBtn" aria-label="Anterior">
                    <i class='bx bx-chevron-left'></i>
                </button>
                <div class="featured-carousel" id="featuredCarousel">
                    <!-- Productos en carrusel -->
                </div>
                <button class="carousel-btn next-btn" id="nextBtn" aria-label="Siguiente">
                    <i class='bx bx-chevron-right'></i>

    <!-- PRODUCTOS RECOMENDADOS -->
