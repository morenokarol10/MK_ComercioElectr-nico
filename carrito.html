<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito – MK Store</title>

    <link rel="stylesheet" href="style.css">

    <!-- BOXICONS -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">

    <link href="https://fonts.googleapis.com/css?family=Jost:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <a href="index.html" class="logo" data-tooltip="MK logo">
            <img src="imagenes/logo.webp" alt="MK Logo">
        </a>

        <ul class="navmenu">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="ofertas.html">Ofertas</a></li>
            <li class="nav-item-dropdown">
                <a href="featured.html" class="nav-link-catalog">Catálogo</a>
                <ul class="dropdown-menu">
                    <li><a href="featured.html?genre=Hombre">Hombre</a></li>
                    <li><a href="featured.html?genre=Mujer">Mujer</a></li>
                    <li><a href="featured.html?genre=Unisex">Unisex</a></li>
                </ul>
            </li>
            <li><a href="contact.html">Contacto</a></li>
        </ul>

        <i id="menu-icon" class='bx bx-menu' role="button" aria-expanded="false" tabindex="0"></i>

        <div class="nav-icon">
            <a href="search.html"><i class='bx bx-search'></i></a>
            <a href="login.html"><i class='bx bx-user'></i></a>
            <a href="favoritos.html"><i class='bx bx-heart'></i></a>
            <a href="carrito.html" class="active"><i class='bx bx-cart'></i></a>
        </div>
    </header>

    <!-- CARRITO -->
    <section class="cart-section" style="margin-top: 140px; padding: 40px;">
        <h2 style="text-align:center;">Tu Carrito</h2>

        <div class="cart-container">
            <!-- Lista de productos del carrito (renderizada por JS) -->
            <div class="cart-items" id="cartItems" aria-live="polite">
                <!-- JS insertará los .cart-item aquí -->
            </div>

            <!-- RESUMEN DE COMPRA -->
            <aside class="cart-summary" id="cartSummary" aria-labelledby="summaryHeading">
                <h3 id="summaryHeading">Resumen</h3>
                <p>Subtotal: <span id="summarySubtotal">$0.00</span></p>
                <p>Envío: <span id="summaryShipping">$5.00</span></p>
                <p>IVA (15%): <span id="summaryIVA">$0.00</span></p>
                <hr>
                <h4>Total: <span id="summaryTotal">$0.00</span></h4>

                <button id="checkoutBtn" class="checkout-btn" onclick="handleCheckout()">Ir a pagar</button>
            </aside>
        </div>
    </section>

    <!-- FOOTER -->
    <div class="end-text">
        <p>Copyright © 2025. MK – Tu estilo, tu esencia.</p>
    </div>

    <script src="nav.js"></script>
    <script src="cart.js"></script>
    <script>
      function handleCheckout() {
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) {
          alert('Debes iniciar sesión para proceder al pago.');
          window.location.href = 'login.html';
          return;
        }
        window.location.href = 'payment.html';
      }
    </script>

</body>
</html>
